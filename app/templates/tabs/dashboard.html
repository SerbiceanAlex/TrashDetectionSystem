<!-- ══ Dashboard Tab ══════════════════════════════════════════════════════ -->
<div x-show="activeTab === 'dashboard'" x-cloak
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 translate-y-2"
  x-transition:enter-end="opacity-100 translate-y-0">

  <!-- Welcome -->
  <div class="dash-welcome">
    <h1>Bun venit, <span x-text="user?.username ?? ''"></span> 👋</h1>
    <p>Raportările tale ajută la menținerea parcurilor curate.</p>
  </div>

  <!-- KPI cards -->
  <div class="kpi-grid">

    <div class="kpi-card">
      <span class="kpi-card__label">Sesiuni totale</span>
      <template x-if="dashLoading">
        <div class="skeleton" style="height:36px;width:60px;border-radius:8px"></div>
      </template>
      <template x-if="!dashLoading">
        <span class="kpi-card__value text-brand" x-text="dashStats?.total_sessions ?? '—'"></span>
      </template>
    </div>

    <div class="kpi-card">
      <span class="kpi-card__label">Detecții AI</span>
      <template x-if="dashLoading">
        <div class="skeleton" style="height:36px;width:60px;border-radius:8px"></div>
      </template>
      <template x-if="!dashLoading">
        <span class="kpi-card__value text-brand" x-text="dashStats?.total_objects ?? '—'"></span>
      </template>
    </div>

    <div class="kpi-card kpi-card--accent">
      <span class="kpi-card__label">Acuratețe model</span>
      <span class="kpi-card__value">97.3%</span>
    </div>

    <div class="kpi-card">
      <span class="kpi-card__label">Timp mediu inferență</span>
      <template x-if="dashLoading">
        <div class="skeleton" style="height:36px;width:70px;border-radius:8px"></div>
      </template>
      <template x-if="!dashLoading">
        <span class="kpi-card__value"
          x-text="dashStats?.avg_inference_ms != null ? dashStats.avg_inference_ms.toFixed(0) + ' ms' : '—'"></span>
      </template>
    </div>

  </div>

  <!-- Quick actions -->
  <div class="dash-actions">
    <button @click="goTo('scan')" class="btn btn--brand btn--lg" style="min-width:220px">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;flex-shrink:0">
        <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      Raportează deșeuri acum
    </button>
    <button @click="goTo('map')" class="btn btn--ghost">
      🗺️ Harta comunității
    </button>
  </div>

  <!-- Material distribution (only if data) -->
  <template x-if="dashStats?.material_distribution?.length > 0">
    <div class="card">
      <h3 class="section-title" style="font-size:14px;margin-bottom:14px">Distribuție materiale detectate</h3>
      <div style="display:flex;flex-direction:column;gap:10px">
        <template x-for="m in dashStats.material_distribution" :key="m.material">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="width:62px;font-size:12px;font-weight:600;text-transform:capitalize;flex-shrink:0" x-text="m.material"></span>
            <div style="flex:1;height:7px;background:var(--bg-border);border-radius:99px;overflow:hidden">
              <div style="height:100%;background:var(--eco-green-dark);border-radius:99px;transition:width .6s ease"
                :style="`width:${dashStats.total_objects > 0 ? (m.count / dashStats.total_objects * 100).toFixed(0) : 0}%`"></div>
            </div>
            <span style="font-size:11px;color:var(--tx-muted);width:28px;text-align:right;flex-shrink:0" x-text="m.count"></span>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- Empty state when no sessions yet -->
  <template x-if="!dashLoading && dashStats && dashStats.total_sessions === 0">
    <div class="empty-state" style="padding:40px 20px">
      <div class="empty-state__icon">📷</div>
      <p class="empty-state__text">Nicio raportare încă.<br>Fă prima ta scanare!</p>
      <button @click="goTo('scan')" class="btn btn--brand" style="margin-top:12px">Scanează acum</button>
    </div>
  </template>

</div>
