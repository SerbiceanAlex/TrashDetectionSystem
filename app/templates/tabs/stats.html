<!-- ╔═══════════════════════════════╗
       ║  TAB: STATISTICI             ║
       ╚═══════════════════════════════╝ -->
  <div x-show="activeTab === 'stats'" x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0">

    <h1 class="section-title">📊 Statistici</h1>

    <!-- Summary cards -->
    <template x-if="stats">
      <div class="grid-4" style="margin-bottom:16px">
        <div class="card stat-card">
          <div class="stat-card__value" style="color:var(--eco-green-dark)" x-text="stats.total_sessions"></div>
          <div class="stat-card__label">Sesiuni</div>
        </div>
        <div class="card stat-card">
          <div class="stat-card__value" x-text="stats.total_objects"></div>
          <div class="stat-card__label">Obiecte</div>
        </div>
        <div class="card stat-card">
          <div class="stat-card__value" style="color:#3b82f6" x-text="stats.avg_inference_ms?.toFixed(0) + 'ms'"></div>
          <div class="stat-card__label">Timp mediu</div>
        </div>
        <div class="card stat-card">
          <div class="stat-card__value" style="color:#f59e0b" x-text="topMaterial?.material || '—'"></div>
          <div class="stat-card__label">Top material</div>
        </div>
      </div>
    </template>

    <!-- Charts -->
    <div style="display:grid;grid-template-columns:1fr;gap:16px">
      <!-- Pie -->
      <div class="card">
        <h2 style="font-size:14px;font-weight:700;margin-bottom:12px">Distribuție materiale</h2>
        <div class="chart-wrap">
          <canvas id="pieChart"></canvas>
        </div>
      </div>

      <!-- Bar timeline -->
      <div class="card">
        <h2 style="font-size:14px;font-weight:700;margin-bottom:12px">Obiecte pe zi</h2>
        <div class="chart-wrap">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <!-- Stacked bar -->
      <div class="card">
        <h2 style="font-size:14px;font-weight:700;margin-bottom:12px">Materiale pe zi</h2>
        <div class="chart-wrap">
          <canvas id="stackedBarChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Export -->
    <div class="card" style="margin-top:16px">
      <h2 style="font-size:14px;font-weight:700;margin-bottom:12px">📥 Export date</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button @click="downloadCsv()" class="btn btn--ghost">
          📊 Descarcă CSV
        </button>
        <button @click="downloadPdf()" class="btn btn--ghost">
          📄 Raport HTML/PDF
        </button>
        <a href="/docs" target="_blank" class="btn btn--ghost">
          📖 API Docs
        </a>
      </div>
    </div>
  </div><!-- /stats tab -->
