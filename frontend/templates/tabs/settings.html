<!-- ══ Settings Tab ═══════════════════════════════════════════════════════ -->
<div x-show="activeTab === 'settings'" x-cloak
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 translate-y-2"
  x-transition:enter-end="opacity-100 translate-y-0">

  <h1 class="section-title">Setări</h1>

  <!-- Profile card -->
  <div class="card" style="margin-bottom:16px">
    <h4 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx-muted);margin-bottom:16px">Profil</h4>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <!-- Avatar initials -->
      <div style="width:60px;height:60px;background:rgba(5,150,105,.12);border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:var(--eco-green-dark);border:1.5px solid rgba(5,150,105,.2);flex-shrink:0"
        x-text="user ? user.username.slice(0,2).toUpperCase() : '?'"></div>
      <div>
        <p style="font-weight:700;font-size:16px" x-text="user?.username ?? ''"></p>
        <p style="font-size:11px;color:var(--tx-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px" x-text="user?.role ?? ''"></p>
        <p style="font-size:13px;color:var(--eco-green-dark);font-weight:700;margin-top:6px">
          ⭐ <span x-text="user?.points ?? 0"></span> puncte comunitate
        </p>
      </div>
    </div>
    <button @click="logout()" class="btn btn--danger" style="width:100%">
      Deconectare
    </button>
  </div>

  <!-- Detection algorithm -->
  <div class="card" style="margin-bottom:16px">
    <h4 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx-muted);margin-bottom:16px">Algoritm YOLOv8</h4>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <label style="font-size:14px;font-weight:600">Prag confidență detecție</label>
        <span style="font-size:16px;font-weight:900;color:var(--eco-green-dark);min-width:36px;text-align:right" x-text="detConf.toFixed(2)"></span>
      </div>
      <input type="range" min="0.05" max="0.95" step="0.05" x-model.number="detConf" class="slider" />
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx-muted);margin-top:6px">
        <span>Mai sensibil</span><span>Mai strict</span>
      </div>
    </div>
  </div>

  <!-- Appearance -->
  <div class="card" style="margin-bottom:16px">
    <h4 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx-muted);margin-bottom:16px">Interfață</h4>
    <!-- Dark mode toggle -->
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:22px">🌙</span>
        <div>
          <p style="font-weight:600;font-size:14px">Mod întunecat</p>
          <p style="font-size:12px;color:var(--tx-muted)">Modifică tema interfeței</p>
        </div>
      </div>
      <!-- Toggle switch -->
      <button @click="toggleDark()" type="button"
        style="width:48px;height:26px;border-radius:99px;border:none;cursor:pointer;transition:background .2s;flex-shrink:0;position:relative;outline:none"
        :style="darkMode ? 'background:#059669' : 'background:var(--bg-border)'">
        <span style="position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:left .2s"
          :style="darkMode ? 'left:25px' : 'left:3px'"></span>
      </button>
    </div>
  </div>

  <!-- App info + API link -->
  <div class="card">
    <h4 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx-muted);margin-bottom:14px">Despre TrashDet</h4>
    <div style="display:flex;flex-direction:column;gap:8px;font-size:13px">
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--tx-muted)">Model detector</span>
        <span style="font-weight:600">YOLOv8s Two-Stage</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--tx-muted)">Backend</span>
        <span style="font-weight:600">FastAPI + SQLite</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--tx-muted)">GPS</span>
        <span style="font-weight:600">EXIF + Browser API</span>
      </div>
    </div>
    <div class="divider" style="margin:16px 0"></div>
    <a href="/docs" target="_blank" rel="noopener"
      style="display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;color:var(--eco-green-dark);text-decoration:none">
      <span>API Docs — Swagger UI</span>
      <span>↗</span>
    </a>
  </div>

</div>
