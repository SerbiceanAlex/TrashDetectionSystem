<!-- ╔═══════════════════════════════╗
       ║  TAB: SCANARE (3 modes)      ║
       ╚═══════════════════════════════╝ -->
  <div x-show="activeTab === 'scan'" x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0">

    <h1 class="section-title"><i data-lucide="camera" class="icon icon--md"></i> Scanare</h1>

    <!-- ═══ Mode selector (3 cards) ═══════════════════════════════════ -->
    <div class="scan-mode-selector">
      <button class="scan-mode-card" :class="scanMode === 'foto' ? 'scan-mode-card--active' : ''" @click="scanMode = 'foto'">
        <span class="scan-mode-card__icon"><i data-lucide="camera" class="icon icon--lg"></i></span>
        <span class="scan-mode-card__label">Foto</span>
        <span class="scan-mode-card__desc">O imagine</span>
      </button>
      <button class="scan-mode-card" :class="scanMode === 'live' ? 'scan-mode-card--active' : ''" @click="scanMode = 'live'">
        <span class="scan-mode-card__icon"><i data-lucide="video" class="icon icon--lg"></i></span>
        <span class="scan-mode-card__label">Live</span>
        <span class="scan-mode-card__desc">Cameră</span>
      </button>
      <button class="scan-mode-card" :class="scanMode === 'batch' ? 'scan-mode-card--active' : ''" @click="scanMode = 'batch'">
        <span class="scan-mode-card__icon"><i data-lucide="package" class="icon icon--lg"></i></span>
        <span class="scan-mode-card__label">Batch</span>
        <span class="scan-mode-card__desc">Mai multe</span>
      </button>
    </div>

    <!-- ═══ MODE: FOTO ════════════════════════════════════════════════ -->
    <div x-show="scanMode === 'foto'" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
      <div style="display:grid;grid-template-columns:1fr;gap:16px" class="detect-grid">

        <div class="card card--elevated">
          <!-- GPS status chip -->
          <div style="margin-bottom:16px">
            <button @click="requestGeo()"
              :class="geoStatus === 'ok' ? 'gps-chip gps-chip--ok' : 'gps-chip'"
              :disabled="geoStatus === 'loading'">
              <span x-text="geoLabel"></span>
              <span x-show="geoStatus === 'ok'" style="font-family:monospace;font-size:10px;opacity:.7"
                x-text="`${geoLat?.toFixed(4)}, ${geoLng?.toFixed(4)}`"></span>
            </button>
          </div>

          <!-- Drop zone -->
          <label for="fileInput" style="display:block;cursor:pointer">
            <div class="drop-zone"
              :class="isDragging ? 'drop-zone--active' : ''"
              @dragover.prevent="isDragging = true"
              @dragleave.prevent="isDragging = false"
              @drop.prevent="handleDrop($event)"
              @click.prevent="document.getElementById('fileInput').click()">

              <template x-if="!previewSrc">
                <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
                  <div class="drop-zone__icon"><i data-lucide="camera" class="icon icon--2xl"></i></div>
                  <div class="drop-zone__text"><strong>Fă o poză</strong> sau alege din galerie</div>
                  <div class="drop-zone__sub">JPEG · PNG · WEBP</div>
                </div>
              </template>
              <template x-if="previewSrc">
                <div style="width:100%">
                  <img :src="previewSrc" style="max-height:220px;max-width:100%;object-fit:contain;border-radius:10px" />
                </div>
              </template>
            </div>
          </label>

          <input id="fileInput" type="file" accept="image/*" capture="environment"
            style="display:none" @change="handleFileSelect($event)" />

          <!-- Clear button -->
          <div x-show="selectedFile" x-cloak
            style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--tx-secondary)">
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="selectedFile?.name"></span>
            <button @click.stop="clearFile()" class="btn btn--danger btn--icon" style="padding:4px 8px;font-size:11px">✕ Șterge</button>
          </div>

          <!-- Sensibilitate AI slider -->
          <div style="margin-top:16px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <label style="font-size:13px;font-weight:600;color:var(--tx-secondary)">Sensibilitate AI</label>
              <span style="font-size:13px;font-weight:700;color:var(--eco-green-dark)" x-text="detConf.toFixed(2)"></span>
            </div>
            <input type="range" min="0.05" max="0.95" step="0.05" x-model.number="detConf" class="slider" :disabled="loading" />
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx-muted);margin-top:4px">
              <span>Mai sensibil (0.05)</span>
              <span>Mai strict (0.95)</span>
            </div>
          </div>

          <!-- User note (optional) -->
          <div style="margin-top:12px">
            <input type="text" x-model="userNote" placeholder="Descriere opțională (ex: lângă parc, zona 3)..."
              class="input" style="font-size:12px;min-height:38px;width:100%" maxlength="500" :disabled="loading" />
          </div>

          <!-- Progress bar -->
          <div x-show="loading" x-cloak style="margin-top:12px">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tx-secondary);margin-bottom:6px">
              <span x-text="uploadProgress < 88 ? 'Se analizează…' : 'AI procesează…'"></span>
              <span style="font-weight:700;color:var(--eco-green-dark)" x-text="uploadProgress + '%'"></span>
            </div>
            <div class="progress"><div class="progress__bar" :style="`width:${uploadProgress}%`"></div></div>
          </div>

          <!-- Scan button -->
          <button @click="runDetection()" :disabled="!selectedFile || loading"
            class="btn btn--scan" style="margin-top:16px">
            <template x-if="loading"><div class="spinner"></div></template>
            <span x-text="loading ? 'Se procesează…' : 'Analizează zona'"></span>
          </button>
        </div>

        <!-- Result panel -->
        <div class="card" x-show="result || loading" x-cloak
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-y-4"
          x-transition:enter-end="opacity-100 translate-y-0">

          <template x-if="loading && !result">
            <div style="display:flex;flex-direction:column;gap:10px">
              <div class="skeleton" style="height:180px;border-radius:10px"></div>
              <div style="display:flex;gap:8px">
                <div class="skeleton" style="height:28px;width:80px;border-radius:99px"></div>
                <div class="skeleton" style="height:28px;width:60px;border-radius:99px"></div>
              </div>
              <div class="skeleton" style="height:14px;border-radius:4px"></div>
              <div class="skeleton" style="height:14px;width:75%;border-radius:4px"></div>
            </div>
          </template>

          <template x-if="result">
            <div class="fade-up">
              <!-- Severity banner -->
              <div x-show="resultSeverity" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;border-radius:10px;background:var(--bg-raised)">
                <i :data-lucide="resultSeverity?.icon" class="icon icon--xl" :style="'color:' + resultSeverity?.color"></i>
                <div>
                  <div style="font-weight:700;font-size:15px" x-text="resultSeverity?.label"></div>
                  <div style="font-size:12px;color:var(--tx-muted)"
                    x-text="`${result.total_objects} obiecte detectate · ${result.inference_ms.toFixed(0)} ms`"></div>
                </div>
                <span class="badge" :class="`sev-${severityFromCount(result.total_objects)}`"
                  style="margin-left:auto" x-text="'#' + result.session_id"></span>
              </div>

              <!-- Location banner -->
              <template x-if="result.address">
                <div style="margin-bottom:14px;padding:8px 12px;border-radius:8px;background:var(--bg-surface);font-size:12px;color:var(--tx-secondary);display:flex;align-items:center;gap:6px;border:1px solid var(--bg-border)">
                  <i data-lucide="map-pin" class="icon icon--sm"></i>
                  <span x-text="result.address" style="line-height:1.3"></span>
                </div>
              </template>

              <!-- Toggle original/annotated -->
              <div style="display:flex;gap:8px;margin-bottom:10px">
                <button @click="showAnnotated = true" :class="showAnnotated ? 'btn btn--primary' : 'btn btn--ghost'"
                  style="flex:1;font-size:12px;min-height:36px;padding:6px 12px">Cu detecții</button>
                <button @click="showAnnotated = false" :class="!showAnnotated ? 'btn btn--primary' : 'btn btn--ghost'"
                  style="flex:1;font-size:12px;min-height:36px;padding:6px 12px">Originală</button>
              </div>

              <!-- Annotated image -->
              <div class="result-img-wrap" @click="openLightbox(showAnnotated ? result.annotated_url : originalImageUrl)">
                <img :src="showAnnotated ? result.annotated_url : originalImageUrl" alt="Rezultat detecție" />
                <div class="result-img-wrap__overlay">
                  <span class="result-img-wrap__hint"><i data-lucide="zoom-in" class="icon icon--sm"></i> Click pentru mărire</span>
                </div>
              </div>

              <!-- Material badges -->
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">
                <template x-for="d in result.detections" :key="d.id">
                  <span class="badge" :style="materialBadgeStyle(d.material)"
                    x-text="d.material + ' ' + (d.cls_score * 100).toFixed(0) + '%'"></span>
                </template>
                <span x-show="result.detections.length === 0"
                  style="font-size:13px;color:var(--tx-muted);font-style:italic;padding:4px 0">
                  Niciun obiect detectat. Încearcă un prag mai mic.
                </span>
              </div>

              <!-- Ajustări avansate (collapsed) -->
              <details style="margin-top:14px">
                <summary style="cursor:pointer;font-size:13px;font-weight:600;color:var(--tx-secondary);padding:8px 0"><i data-lucide="settings" class="icon icon--sm"></i> Ajustări avansate</summary>
                <div style="padding:12px;background:var(--bg-raised);border-radius:10px;margin-top:6px">
                  <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tx-secondary);margin-bottom:6px">
                    <span>Ajustează pragul</span>
                    <span style="font-weight:700;color:var(--eco-green-dark)" x-text="rerunConf.toFixed(2)"></span>
                  </div>
                  <input type="range" min="0.05" max="0.95" step="0.05" x-model.number="rerunConf"
                    class="slider" :disabled="isRerunning" style="margin-bottom:8px" />
                  <button @click="rerunDetection()" :disabled="isRerunning"
                    class="btn btn--ghost" style="width:100%;font-size:12px;min-height:36px">
                    <template x-if="isRerunning"><div class="spinner spinner--dark"></div></template>
                    <span x-text="isRerunning ? 'Se re-analizează…' : '↩ Re-detectează cu conf ' + rerunConf.toFixed(2)"></span>
                  </button>
                </div>
              </details>
            </div>
          </template>
        </div>

      </div>
    </div><!-- /foto mode -->

    <!-- ═══ MODE: LIVE ════════════════════════════════════════════════ -->
    <div x-show="scanMode === 'live'" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
      <div class="card card--elevated">
        <!-- Camera container -->
        <div style="position:relative;width:100%;background:#111;border-radius:12px;overflow:hidden;aspect-ratio:3/4;margin-bottom:16px;">
          <video x-ref="webcamVideo" autoplay playsinline muted style="display:none;"></video>
          <canvas x-ref="displayCanvas" style="width:100%;height:100%;object-fit:cover;display:block"></canvas>

          <!-- Flash effect -->
          <div x-show="snapshotFlash"
            style="position:absolute;inset:0;background:white;pointer-events:none;border-radius:12px;"
            x-transition:enter="transition-opacity duration-75"
            x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition-opacity duration-200"
            x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"></div>

          <!-- Overlay Status + Flip -->
          <div style="position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:center">
            <span class="badge" :class="wsConnected ? 'badge--green' : 'badge--gray'"
                  x-text="wsConnected ? 'Live' : (webcamActive ? 'Se conectează...' : 'Inactiv')"></span>
            <div style="display:flex;gap:8px;align-items:center">
              <button x-show="webcamActive" @click="flipCamera()"
                style="background:rgba(0,0,0,0.55);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)"
                title="Întoarce camera"><i data-lucide="refresh-cw" class="icon icon--md" style="color:#fff"></i></button>
              <span x-show="wsConnected" class="badge badge--blue" x-text="liveFps.toFixed(1) + ' FPS'"></span>
            </div>
          </div>

          <!-- Objects counter -->
          <div x-show="liveObjects > 0" style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);pointer-events:none;transition:all .2s ease">
            <span class="badge sev-high" style="font-size:16px;padding:8px 16px;box-shadow:0 4px 12px rgba(239, 68, 68, 0.4)"
                  x-text="liveObjects + ' obiecte!'"></span>
          </div>

          <!-- Snapshot button -->
          <div x-show="webcamActive" style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:12px;align-items:center">
            <button @click="saveSnapshot()" :disabled="snapshotLoading"
              style="width:64px;height:64px;border-radius:50%;border:4px solid white;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:transform .15s ease"
              @touchstart="$el.style.transform='scale(0.9)'" @touchend="$el.style.transform='scale(1)'"
              title="Salvează cadru">
              <template x-if="snapshotLoading"><div class="spinner" style="width:24px;height:24px;border-color:white;border-top-color:transparent"></div></template>
              <span x-show="!snapshotLoading"><i data-lucide="camera" class="icon icon--lg" style="color:#fff"></i></span>
            </button>
          </div>

          <!-- CTA when stopped -->
          <div x-show="!webcamActive" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:rgba(255,255,255,0.7)">
            <div style="margin-bottom:12px"><i data-lucide="video" class="icon icon--2xl"></i></div>
            <div style="font-size:14px;font-weight:600">Apasă pe "Pornește"</div>
            <div style="font-size:11px;opacity:.7;margin-top:4px;text-align:center;padding:0 24px">Camera se va activa și AI-ul va scana live.</div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <button @click="startWebcam()" x-show="!webcamActive" class="btn btn--scan" style="height:48px;grid-column:1/-1"><i data-lucide="play" class="icon icon--sm"></i> Pornește Camera</button>
          <button @click="stopWebcam()" x-show="webcamActive" class="btn btn--danger" style="height:48px"><i data-lucide="square" class="icon icon--sm"></i> Oprește</button>
          <button @click="saveSnapshot()" x-show="webcamActive" :disabled="snapshotLoading" class="btn btn--scan" style="height:48px">
            <template x-if="snapshotLoading"><div class="spinner spinner--dark" style="width:16px;height:16px"></div></template>
            <span x-show="!snapshotLoading"><i data-lucide="camera" class="icon icon--sm"></i> Salvează</span>
          </button>
        </div>

        <!-- Live confidence -->
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bg-border)">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <label style="font-size:13px;font-weight:600;color:var(--tx-secondary)">Sensibilitate AI</label>
            <span style="font-size:13px;font-weight:700;color:var(--eco-green-dark)" x-text="detConf.toFixed(2)"></span>
          </div>
          <input type="range" min="0.10" max="0.95" step="0.05" x-model.number="detConf"
            @change="if(webcamActive){ stopWebcam(); setTimeout(()=>startWebcam(),300); }" class="slider" />
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx-muted);margin-top:6px">
            <span>Mai multe f. pozitive (0.10)</span>
            <span>Doar deșeuri sigure (0.95)</span>
          </div>
        </div>
      </div>
    </div><!-- /live mode -->

    <!-- ═══ MODE: BATCH ═══════════════════════════════════════════════ -->
    <div x-show="scanMode === 'batch'" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
      <div class="card card--elevated">

        <!-- GPS chip -->
        <div style="margin-bottom:16px">
          <button @click="requestGeo()"
            :class="geoStatus === 'ok' ? 'gps-chip gps-chip--ok' : 'gps-chip'"
            :disabled="geoStatus === 'loading'">
            <span x-text="geoLabel"></span>
          </button>
        </div>

        <!-- Batch file input -->
        <label class="drop-zone" style="display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer"
          @click.prevent="document.getElementById('batchFileInput').click()">
          <div class="drop-zone__icon"><i data-lucide="package" class="icon icon--2xl"></i></div>
          <div class="drop-zone__text"><strong>Alege mai multe imagini</strong></div>
          <div class="drop-zone__sub">Poți selecta 2–20 imagini simultan</div>
        </label>
        <input id="batchFileInput" type="file" accept="image/*" multiple
          style="display:none" @change="handleBatchSelect($event)" />

        <!-- Selected files count -->
        <div x-show="batchFiles.length > 0" style="margin-top:12px;font-size:13px;font-weight:600;color:var(--tx-secondary)">
          <i data-lucide="paperclip" class="icon icon--xs"></i> <span x-text="batchFiles.length"></span> imagini selectate
        </div>

        <!-- Sensibilitate AI slider -->
        <div style="margin-top:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <label style="font-size:13px;font-weight:600;color:var(--tx-secondary)">Sensibilitate AI</label>
            <span style="font-size:13px;font-weight:700;color:var(--eco-green-dark)" x-text="detConf.toFixed(2)"></span>
          </div>
          <input type="range" min="0.05" max="0.95" step="0.05" x-model.number="detConf" class="slider" :disabled="batchLoading" />
        </div>

        <!-- Batch progress -->
        <div x-show="batchLoading" x-cloak style="margin-top:12px">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tx-secondary);margin-bottom:6px">
            <span>Se procesează batch-ul…</span>
          </div>
          <div class="progress"><div class="progress__bar" style="width:100%;animation:pulse 1.5s infinite"></div></div>
        </div>

        <!-- Scan batch button -->
        <button @click="runBatch()" :disabled="!batchFiles.length || batchLoading"
          class="btn btn--scan" style="margin-top:16px">
          <template x-if="batchLoading"><div class="spinner"></div></template>
          <span x-text="batchLoading ? 'Se procesează…' : 'Analizează ' + batchFiles.length + ' imagini'"></span>
        </button>
      </div>

      <!-- Batch results -->
      <div class="card" x-show="batchResults" x-cloak style="margin-top:16px"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-4"
        x-transition:enter-end="opacity-100 translate-y-0">
        <template x-if="batchResults">
          <div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;border-radius:10px;background:var(--bg-raised)">
              <span class="icon-box icon-box--md icon-box--green"><i data-lucide="package" class="icon icon--md"></i></span>
              <div>
                <div style="font-weight:700;font-size:15px">Batch finalizat</div>
                <div style="font-size:12px;color:var(--tx-muted)"
                  x-text="`${batchResults.total_files} imagini · ${batchResults.total_objects} obiecte detectate`"></div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
              <template x-for="s in batchResults.sessions" :key="s.session_id">
                <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:var(--bg-raised)">
                  <img :src="s.annotated_url" style="width:56px;height:56px;object-fit:cover;border-radius:8px" />
                  <div style="flex:1">
                    <div style="font-weight:600;font-size:13px" x-text="'#' + s.session_id"></div>
                    <div style="font-size:11px;color:var(--tx-muted)" x-text="s.total_objects + ' obiecte · ' + s.inference_ms.toFixed(0) + ' ms'"></div>
                  </div>
                  <button @click="goTo('reports')" class="btn btn--ghost" style="padding:4px 10px;font-size:11px">Detalii</button>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div><!-- /batch mode -->

  </div><!-- /scan tab -->
