<!-- ╔═══════════════════════════════╗
       ║  TAB: HARTĂ                  ║
       ╚═══════════════════════════════╝ -->
  <div x-show="activeTab === 'map'" x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0">

    <h1 class="section-title"><i data-lucide="map" class="icon icon--md"></i> Hartă poluare</h1>

    <!-- Toolbar -->
    <div class="map-toolbar">
      <button @click="setViewMode('zones')" :class="mapViewMode === 'zones' ? 'map-view-btn map-view-btn--active' : 'map-view-btn'"><i data-lucide="circle-dot" class="icon icon--xs"></i> Zone</button>
      <button @click="setViewMode('heat')"  :class="mapViewMode === 'heat'  ? 'map-view-btn map-view-btn--active' : 'map-view-btn'"><i data-lucide="thermometer" class="icon icon--xs"></i> Heatmap</button>
      <button @click="setViewMode('markers')" :class="mapViewMode === 'markers' ? 'map-view-btn map-view-btn--active' : 'map-view-btn'"><i data-lucide="map-pin" class="icon icon--xs"></i> Markeri</button>
      <button @click="centerOnUser()" class="map-view-btn" style="margin-left:auto">
        <template x-if="geoLoading"><div class="spinner spinner--dark" style="width:14px;height:14px"></div></template>
        <span x-show="!geoLoading"><i data-lucide="locate" class="icon icon--xs"></i> Locație</span>
      </button>
      <button @click="loadMapData()" class="map-view-btn" :disabled="mapLoading">
        <template x-if="mapLoading"><div class="spinner spinner--dark" style="width:14px;height:14px"></div></template>
        <span x-show="!mapLoading"><i data-lucide="refresh-cw" class="icon icon--xs"></i></span>
      </button>
    </div>

    <!-- Filter bar -->
    <div class="card map-filter-bar">
      <div class="map-filter-bar__row">
        <span class="map-filter-bar__label">Filtre:</span>
        <div class="map-filter-bar__group">
          <button @click="mapFilterResolved=''; loadMapData()"
            :class="mapFilterResolved === '' ? 'map-view-btn map-view-btn--active' : 'map-view-btn'">Toate</button>
          <button @click="mapFilterResolved='0'; loadMapData()"
            :class="mapFilterResolved === '0' ? 'map-view-btn map-view-btn--active' : 'map-view-btn'"><i data-lucide="circle-alert" class="icon icon--xs"></i> Nerezolvate</button>
          <button @click="mapFilterResolved='1'; loadMapData()"
            :class="mapFilterResolved === '1' ? 'map-view-btn map-view-btn--active' : 'map-view-btn'"><i data-lucide="circle-check" class="icon icon--xs"></i> Rezolvate</button>
        </div>
        <select x-model="mapFilterMaterial" @change="loadMapData()" class="map-select">
          <option value="">Toate materialele</option>
          <option value="plastic">Plastic</option>
          <option value="paper">Paper</option>
          <option value="glass">Glass</option>
          <option value="metal">Metal</option>
          <option value="other">Other</option>
        </select>
        <span x-show="mapFilterResolved !== '' || mapFilterMaterial" class="map-filter-bar__count"
          x-text="`${mapReports.length} rapoarte filtrate`"></span>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="card" style="margin-bottom:12px;padding:12px 16px">
      <div class="map-stats-grid">
        <div>
          <div class="map-stat__value" style="color:var(--eco-green-dark)" x-text="mapStats.total"></div>
          <div class="map-stat__label">Rapoarte</div>
        </div>
        <div>
          <div class="map-stat__value" x-text="mapStats.objects"></div>
          <div class="map-stat__label">Obiecte</div>
        </div>
        <div>
          <div class="map-stat__value" style="color:#ef4444" x-text="mapStats.highZones"></div>
          <div class="map-stat__label">Zone critice</div>
        </div>
        <div>
          <div class="map-stat__value" x-text="mapStats.zones"></div>
          <div class="map-stat__label">Zone totale</div>
        </div>
      </div>
    </div>

    <!-- Map -->
    <div class="card" style="padding:0;overflow:hidden">
      <div id="ecoMap" style="height:460px;border-radius:14px"></div>
    </div>

    <!-- Legend -->
    <div class="legend" style="margin-top:12px">
      <span class="legend__item"><span class="legend__dot" style="background:#eab308"></span> Pending</span>
      <span class="legend__item"><span class="legend__dot" style="background:#10b981"></span> Verificat</span>
      <span class="legend__item"><span class="legend__dot" style="background:#3b82f6"></span> In progres</span>
      <span class="legend__item"><span class="legend__dot" style="background:#22c55e"></span> Curățat</span>
      <span class="legend__item"><span class="legend__dot" style="background:#ef4444"></span> Fals</span>
    </div>

    <!-- Nearby reports section -->
    <div class="card" style="margin-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h2 style="font-size:15px;font-weight:700">Rapoarte în apropiere</h2>
        <div style="display:flex;align-items:center;gap:8px">
          <select x-model.number="nearbyRadius" class="map-select">
            <option value="0.5">500m</option>
            <option value="1">1 km</option>
            <option value="2">2 km</option>
            <option value="5">5 km</option>
          </select>
          <button @click="loadNearby()" :disabled="nearbyLoading" class="btn btn--ghost" style="font-size:12px;min-height:32px;padding:4px 12px">
            <template x-if="nearbyLoading"><div class="spinner spinner--dark" style="width:12px;height:12px"></div></template>
            <span x-show="!nearbyLoading">Caută</span>
          </button>
        </div>
      </div>
      <template x-if="nearbyReports.length > 0">
        <div>
          <template x-for="r in nearbyReports" :key="r.id">
            <div class="report-card" style="padding:10px;border-radius:10px">
              <img x-show="r.annotated_path" :src="getAnnotatedUrl(r.annotated_path)"
                class="report-card__thumb" @error="$el.style.display='none'" />
              <div class="report-card__body">
                <div class="report-card__name" x-text="r.filename"></div>
                <div class="report-card__meta">
                  <span :class="`badge sev-${severityFromCount(r.total_objects)}`"
                    x-text="r.total_objects + ' obiecte'"></span>
                  · <span x-text="timeAgo(r.upload_time)"></span>
                </div>
                <template x-if="r.address">
                  <div class="text-xs text-muted truncate" style="margin-top:4px" x-text="r.address"><i data-lucide="map-pin" class="icon icon--xs"></i> </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>
      <div x-show="nearbyReports.length === 0 && !nearbyLoading" class="empty-state" style="padding:24px">
        <div class="empty-state__icon"><i data-lucide="map-pin" class="icon icon--2xl"></i></div>
        <div class="empty-state__text">Apasă "Caută" pentru rapoarte din apropiere</div>
      </div>
    </div>
  </div><!-- /map tab -->
