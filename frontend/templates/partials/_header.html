<!-- Top header bar -->
<header class="td-header">
  <button @click="sidebarOpen = !sidebarOpen" class="td-header__hamburger">
    <i data-lucide="menu" class="icon icon--lg"></i>
  </button>

  <span class="td-header__title" x-text="tabs.find(t=>t.id===activeTab)?.label ?? ''"></span>

  <span style="flex:1"></span>

  <div x-show="isLoggedIn" x-cloak class="td-header__points">
    <i data-lucide="star" class="icon icon--sm"></i><span x-text="user?.points ?? 0"></span>
  </div>

  <!-- Notification bell -->
  <div x-show="isLoggedIn" x-cloak class="notif-wrapper">
    <button @click="notifOpen = !notifOpen" class="td-header__dark-btn notif-bell" title="Notificări">
      <i data-lucide="bell" class="icon icon--md"></i>
      <span x-show="unreadNotifications > 0" x-cloak class="notif-badge"
        x-text="unreadNotifications > 9 ? '9+' : unreadNotifications"></span>
    </button>

    <!-- Notification panel -->
    <div x-show="notifOpen" x-cloak @click.outside="notifOpen=false"
      x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      class="notif-panel">
      <div class="notif-panel__header">
        <span class="notif-panel__title">Notificări</span>
        <button x-show="unreadNotifications > 0" @click="markAllRead()" class="notif-panel__mark-read">Marchează toate citite</button>
      </div>
      <div class="notif-panel__list">
        <template x-if="notifications.length === 0">
          <div class="notif-panel__empty">Nicio notificare</div>
        </template>
        <template x-for="n in notifications" :key="n.id">
          <div @click="markRead(n)"
            :class="'notif-item' + (n.is_read ? '' : ' notif-item--unread')">
            <span class="notif-item__icon">
              <i :data-lucide="({
                rank_up:'trending-up', streak:'flame', vote:'vote', nearby:'map-pin',
                cleaned:'circle-check', verified:'badge-check', rejected:'x-circle', motivation:'bell-ring',
                resolved:'check-circle', badge:'award', broadcast:'megaphone'
              })[n.category] || 'info'" class="icon icon--md"></i>
            </span>
            <div class="notif-item__body">
              <p class="notif-item__message" x-text="n.message"></p>
              <p class="notif-item__time" x-text="formatNotifDate(n.created_at)"></p>
            </div>
            <span x-show="!n.is_read" class="notif-item__dot"></span>
          </div>
        </template>
      </div>
    </div>
  </div>

  <button @click="toggleDark()" class="td-header__dark-btn" :title="darkMode ? 'Mod luminos' : 'Mod întunecat'">
    <i x-show="!darkMode" data-lucide="moon" class="icon icon--md"></i>
    <i x-show="darkMode" x-cloak data-lucide="sun" class="icon icon--md"></i>
  </button>

  <button @click="goTo('scan')" class="td-header__scan-cta">
    <i data-lucide="camera" class="icon icon--sm"></i>
    <span>Scanează</span>
  </button>
</header>
