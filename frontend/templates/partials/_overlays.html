<!-- Loader (shown during auth check) -->
<div x-show="authLoading" x-cloak class="td-loader">
  <div class="td-loader__core-wrap">
    <div class="td-loader__wave"></div>
    <div class="td-loader__wave" style="animation-delay:0.8s"></div>
    <div class="td-loader__wave" style="animation-delay:1.6s"></div>
    <div class="td-loader__orbit"></div>
    <div class="td-loader__core">
      <div class="td-loader__scan-line"></div>
      <div class="td-loader__dot"></div>
      <span class="td-logo__c td-logo__c--tl"></span>
      <span class="td-logo__c td-logo__c--tr"></span>
      <span class="td-logo__c td-logo__c--bl"></span>
      <span class="td-logo__c td-logo__c--br"></span>
    </div>
  </div>
  <p class="td-loader__label">Se autentifică…</p>
  <p class="td-loader__sub">TrashDet Intelligence Engine</p>
</div>

<!-- Toast notifications -->
<div class="toast-container">
  <template x-for="toast in toasts" :key="toast.id">
    <div x-show="toast.visible"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-x-8"
      x-transition:enter-end="opacity-100 translate-x-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      :class="toast.type === 'error' ? 'toast toast--error' : 'toast toast--success'">
      <span style="font-weight:800;font-size:14px;flex-shrink:0">
        <template x-if="toast.type === 'error'"><i data-lucide="x" class="icon icon--sm"></i></template>
        <template x-if="toast.type !== 'error'"><i data-lucide="check" class="icon icon--sm"></i></template>
      </span>
      <span x-text="toast.message"></span>
    </div>
  </template>
</div>

<!-- Image lightbox -->
<div x-show="lightboxSrc" x-cloak
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
  @click="closeLightbox()" @keydown.escape.window="closeLightbox()"
  class="lightbox">
  <img :src="lightboxSrc" @click.stop />
  <button @click="closeLightbox()" class="lightbox__close"><i data-lucide="x" class="icon icon--md"></i></button>
</div>
